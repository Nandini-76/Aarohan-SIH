# Render Blueprint for backend deployment
services:
  - type: web
    name: arohann-backend
    env: python
    region: oregon
    plan: free
    branch: main
  buildCommand: pip install -r backend/requirements.txt
  startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        value: 8000
      - key: DB_NAME
        value: dropout_prediction
      # Set these in Render dashboard for security
      - key: MONGO_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
